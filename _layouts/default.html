<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.subtitle }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="author" content="{{ site.author.name }}" />
  <meta name="theme-color" content="#0a0908" />

  <!-- Open Graph -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }} — {{ site.subtitle }}{% endif %}" />
  <meta property="og:description" content="{{ page.description | default: page.excerpt | default: site.description | strip_html | truncate: 200 }}" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />
  <meta property="og:site_name" content="{{ site.title }}" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta name="twitter:description" content="{{ page.description | default: page.excerpt | default: site.description | strip_html | truncate: 200 }}" />

  <link rel="icon" type="image/jpeg" href="/assets/img/me.jpg" />
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/newsletter/feed.xml' | relative_url }}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />

  {% include style.html %}
  {% seo %}
</head>
<body>
  <div class="atmos"></div>
  <div class="grid-floor"></div>
  <div class="grain"></div>

  <header class="hud">
    <div class="hud-left">
      <span class="pulse">Latent · Newsletter</span>
      <span class="hide-sm">Field notes from the GenAI frontier</span>
    </div>
    <div class="hud-right">
      <span class="hide-sm">v.2026 / build.08</span>
      <span id="clock">--:--:-- IST</span>
    </div>
  </header>

  <nav class="nav" aria-label="Primary">
    <a href="/">← Portfolio</a>
    <a href="{{ '/newsletter/' | relative_url }}" class="{% if page.url == '/newsletter/' or page.layout == 'newsletter' %}is-active{% endif %}">Newsletter</a>
    <a href="{{ '/newsletter/feed.xml' | relative_url }}">RSS</a>
    <a href="/#contact">Contact</a>
  </nav>

  <main class="page">
    {{ content }}

    <footer class="foot">
      <div>© {{ 'now' | date: '%Y' }} — {{ site.author.name }}</div>
      <div>
        <a href="{{ '/newsletter/feed.xml' | relative_url }}">RSS</a>
        &nbsp;·&nbsp;
        <a href="/">Portfolio</a>
      </div>
    </footer>
  </main>

  <script>
    (function () {
      var clock = document.getElementById('clock');
      function tick () {
        var now = new Date();
        var ist = new Date(now.getTime() + (now.getTimezoneOffset() + 330) * 60000);
        var pad = function (n) { return String(n).padStart(2, '0'); };
        clock.textContent = pad(ist.getHours()) + ':' + pad(ist.getMinutes()) + ':' + pad(ist.getSeconds()) + ' IST';
      }
      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
