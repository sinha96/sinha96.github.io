<style>
  :root {
    --ink:        #0a0908;
    --ink-2:      #131110;
    --ink-3:      #1c1a17;
    --paper:      #efeae0;
    --paper-mute: rgba(239, 234, 224, 0.55);
    --paper-faint:rgba(239, 234, 224, 0.18);
    --rule:       rgba(239, 234, 224, 0.10);
    --rule-2:     rgba(239, 234, 224, 0.22);
    --accent:     #d4ff3c;
    --accent-2:   #ff5b22;
    --mono:       'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace;
    --pad-x:      clamp(1.25rem, 4vw, 4rem);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  *::selection { background: var(--accent); color: var(--ink); }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--mono);
    font-weight: 300;
    font-size: 14px;
    line-height: 1.65;
    color: var(--paper);
    background: var(--ink);
    letter-spacing: 0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  a { color: inherit; text-decoration: none; }

  /* Atmosphere */
  .atmos, .grid-floor, .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .atmos {
    background:
      radial-gradient(800px 500px at 18% 22%, rgba(212,255,60,0.07), transparent 60%),
      radial-gradient(900px 600px at 82% 78%, rgba(255,91,34,0.05), transparent 60%);
    animation: drift 24s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate3d(0,0,0); }
    100% { transform: translate3d(-3%, 2%, 0); }
  }
  .grid-floor {
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule) 1px, transparent 1px);
    background-size: 88px 88px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 40%, transparent 90%);
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 40%, transparent 90%);
  }
  .grain {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.92  0 0 0 0 0.85  0 0 0 0.6 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.06;
    mix-blend-mode: overlay;
  }

  /* HUD */
  .hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.85rem var(--pad-x);
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper-mute);
    z-index: 80;
    pointer-events: none;
    background: rgba(10, 9, 8, 0.72);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    backdrop-filter: blur(14px) saturate(140%);
    border-bottom: 1px solid var(--rule);
  }
  .hud > * { pointer-events: auto; }
  .hud-left, .hud-right { display: flex; gap: 1.5rem; align-items: center; }
  .hud .pulse {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--paper);
  }
  .hud .pulse::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: blink 1.6s ease infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.35; transform: scale(0.8); }
  }
  @media (max-width: 700px) {
    .hud { font-size: 9.5px; padding: 0.7rem 1rem; }
    .hud .hide-sm { display: none; }
  }

  /* Bottom nav */
  .nav {
    position: fixed;
    bottom: 1.4rem; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2px;
    padding: 5px;
    background: rgba(19, 17, 16, 0.78);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--rule);
    border-radius: 999px;
    z-index: 90;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .nav a {
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--paper-mute);
    border-radius: 999px;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .nav a:hover, .nav a.is-active {
    color: var(--ink);
    background: var(--accent);
  }
  @media (max-width: 700px) {
    .nav { gap: 0; padding: 4px; bottom: 1rem; max-width: calc(100vw - 1rem); overflow-x: auto; }
    .nav a { padding: 6px 10px; font-size: 9.5px; }
  }

  /* Page wrapper */
  .page {
    position: relative;
    z-index: 2;
    max-width: 880px;
    margin: 0 auto;
    padding: clamp(5rem, 11vh, 7rem) var(--pad-x) 7rem;
  }

  /* Newsletter masthead */
  .mast {
    margin-bottom: 4rem;
    padding-bottom: 2.5rem;
    border-bottom: 1px solid var(--rule);
  }
  .mast-eyebrow {
    display: flex;
    gap: 1.4rem;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--paper-mute);
    margin-bottom: 1.5rem;
    align-items: center;
  }
  .mast-eyebrow .col { color: var(--accent); }
  .mast-eyebrow a {
    color: var(--paper-mute);
    border-bottom: 1px dotted var(--paper-faint);
    transition: color 0.2s;
  }
  .mast-eyebrow a:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .mast-title {
    font-family: var(--mono);
    font-weight: 600;
    font-size: clamp(2.2rem, 5.5vw, 4rem);
    line-height: 1;
    letter-spacing: -0.05em;
    color: var(--paper);
  }
  .mast-title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .mast-sub {
    margin-top: 1rem;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.5;
    color: var(--paper-mute);
    max-width: 60ch;
    font-weight: 300;
  }
  .mast-sub em {
    font-style: italic;
    color: var(--accent);
  }
  .mast-meta {
    margin-top: 2rem;
    display: flex;
    gap: 1.6rem;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--paper-mute);
  }
  .mast-meta a {
    color: var(--paper-mute);
    border-bottom: 1px dotted var(--paper-faint);
    transition: color 0.2s, border-color 0.2s;
  }
  .mast-meta a:hover { color: var(--accent); border-bottom-color: var(--accent); }

  /* Post list */
  .posts-list {
    list-style: none;
    display: grid;
    gap: 1.5rem;
  }
  .posts-list li {
    padding: 1.6rem 0;
    border-bottom: 1px solid var(--rule);
    transition: padding 0.25s ease;
  }
  .posts-list li:hover { padding-left: 0.4rem; }
  .posts-list li:last-child { border-bottom: none; }
  .post-row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 1.6rem;
    align-items: start;
  }
  @media (max-width: 600px) {
    .post-row { grid-template-columns: 1fr; gap: 0.4rem; }
  }
  .post-date {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--paper-mute);
    padding-top: 4px;
  }
  .post-date b {
    color: var(--accent);
    font-weight: 500;
  }
  .post-link h2 {
    font-family: var(--mono);
    font-weight: 500;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    line-height: 1.2;
    letter-spacing: -0.025em;
    color: var(--paper);
    transition: color 0.2s;
  }
  .post-link h2 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .post-link:hover h2 { color: var(--accent); }
  .post-excerpt {
    margin-top: 0.55rem;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--paper-mute);
    font-weight: 300;
  }
  .post-tags {
    margin-top: 0.7rem;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .post-tag {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper-mute);
    padding: 3px 8px;
    border: 1px solid var(--rule-2);
    border-radius: 2px;
  }

  /* Empty state */
  .empty {
    padding: 4rem 0;
    text-align: center;
    font-family: var(--mono);
    color: var(--paper-mute);
    font-size: 13px;
  }
  .empty .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 8px;
    animation: blink 1.6s ease infinite;
  }

  /* Single post */
  .post-head {
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--rule);
  }
  .post-eyebrow {
    display: flex;
    gap: 1.4rem;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--paper-mute);
    margin-bottom: 1.5rem;
  }
  .post-eyebrow .col { color: var(--accent); }
  .post-eyebrow a {
    color: var(--paper-mute);
    border-bottom: 1px dotted var(--paper-faint);
    transition: color 0.2s;
  }
  .post-eyebrow a:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .post-title {
    font-family: var(--mono);
    font-weight: 600;
    font-size: clamp(1.8rem, 4.5vw, 3rem);
    line-height: 1.1;
    letter-spacing: -0.04em;
    color: var(--paper);
  }
  .post-title em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }
  .post-byline {
    margin-top: 1.4rem;
    display: flex;
    gap: 1.4rem;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--paper-mute);
  }
  .post-byline b { color: var(--paper); font-weight: 500; }

  /* Post body — markdown */
  .post-body {
    font-family: var(--mono);
    font-weight: 300;
    font-size: 14px;
    line-height: 1.75;
    color: var(--paper);
    max-width: 70ch;
  }
  .post-body > * + * { margin-top: 1.4rem; }
  .post-body h2, .post-body h3, .post-body h4 {
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--paper);
    margin-top: 2.6rem;
  }
  .post-body h2 {
    font-size: 1.4rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--rule);
  }
  .post-body h3 { font-size: 1.15rem; }
  .post-body h4 {
    font-size: 0.92rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--accent);
  }
  .post-body p { color: var(--paper); }
  .post-body em {
    font-style: italic;
    color: var(--accent);
  }
  .post-body strong { color: var(--paper); font-weight: 500; }
  .post-body a {
    color: var(--paper);
    border-bottom: 1px dotted var(--paper-faint);
    transition: color 0.2s, border-color 0.2s;
  }
  .post-body a:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .post-body ul, .post-body ol {
    padding-left: 0;
    list-style: none;
  }
  .post-body li {
    padding-left: 1.6rem;
    position: relative;
    margin-bottom: 0.5rem;
  }
  .post-body ul > li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
  }
  .post-body ol { counter-reset: ol; }
  .post-body ol > li {
    counter-increment: ol;
    padding-left: 2rem;
  }
  .post-body ol > li::before {
    content: counter(ol, decimal-leading-zero) ' ·';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 0.85em;
    letter-spacing: 0.05em;
  }
  .post-body blockquote {
    margin: 2rem 0;
    padding: 1rem 0 1rem 1.5rem;
    border-left: 2px solid var(--accent);
    font-style: italic;
    color: var(--paper-mute);
    font-size: 1.05em;
  }
  .post-body code {
    font-family: var(--mono);
    font-size: 0.92em;
    padding: 1px 6px;
    background: var(--ink-3);
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--accent);
  }
  .post-body pre {
    background: var(--ink-2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 1.2rem 1.4rem;
    overflow-x: auto;
    line-height: 1.6;
    font-size: 12.5px;
  }
  .post-body pre code {
    background: transparent;
    border: none;
    padding: 0;
    color: var(--paper);
  }
  .post-body hr {
    border: none;
    height: 1px;
    background: var(--rule);
    margin: 2.5rem 0;
  }
  .post-body img {
    max-width: 100%;
    height: auto;
    border-radius: 2px;
    border: 1px solid var(--rule);
  }
  .post-body table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.92em;
  }
  .post-body th, .post-body td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--rule);
  }
  .post-body th {
    font-weight: 500;
    color: var(--paper);
    border-bottom-color: var(--rule-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 10.5px;
  }

  /* Post footer — tags + nav */
  .post-foot {
    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
  }
  .post-pager {
    margin-top: 2.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .post-pager > * {
    padding: 1rem 1.2rem;
    border: 1px solid var(--rule);
    border-radius: 4px;
    transition: all 0.25s;
  }
  .post-pager > a:hover {
    border-color: var(--paper-faint);
    background: var(--ink-2);
    transform: translate3d(0,-1px,0);
  }
  .post-pager .lbl {
    display: block;
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--paper-mute);
    margin-bottom: 0.4rem;
  }
  .post-pager strong {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--paper);
    line-height: 1.25;
    font-size: 13px;
    letter-spacing: -0.02em;
  }
  .post-pager .next { text-align: right; }
  @media (max-width: 600px) {
    .post-pager { grid-template-columns: 1fr; }
    .post-pager .next { text-align: left; }
  }

  /* Footer */
  .foot {
    margin-top: 5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper-mute);
  }
  .foot a {
    color: var(--paper-mute);
    border-bottom: 1px dotted var(--paper-faint);
  }
  .foot a:hover { color: var(--accent); border-bottom-color: var(--accent); }
</style>
